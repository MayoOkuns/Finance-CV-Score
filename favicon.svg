<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Square vault door — dark navy background -->
  <rect width="100" height="100" rx="16" fill="#0F172A"/>
  <!-- Outer door frame -->
  <rect x="8" y="8" width="84" height="84" rx="10" fill="#1E293B" stroke="#334155" stroke-width="2"/>
  <!-- Door inner plate -->
  <rect x="14" y="14" width="72" height="72" rx="7" fill="#1E293B" stroke="#1E3A5F" stroke-width="1.5"/>
  <!-- Corner bolts — the defining vault feature -->
  <circle cx="24" cy="24" r="6" fill="#0F172A" stroke="#475569" stroke-width="1.5"/>
  <circle cx="76" cy="24" r="6" fill="#0F172A" stroke="#475569" stroke-width="1.5"/>
  <circle cx="24" cy="76" r="6" fill="#0F172A" stroke="#475569" stroke-width="1.5"/>
  <circle cx="76" cy="76" r="6" fill="#0F172A" stroke="#475569" stroke-width="1.5"/>
  <!-- Bolt highlight dots -->
  <circle cx="22" cy="22" r="2" fill="#64748B"/>
  <circle cx="74" cy="22" r="2" fill="#64748B"/>
  <circle cx="22" cy="74" r="2" fill="#64748B"/>
  <circle cx="74" cy="74" r="2" fill="#64748B"/>
  <!-- Side locking bolts -->
  <rect x="4" y="38" width="6" height="10" rx="2" fill="#334155" stroke="#475569" stroke-width="1"/>
  <rect x="4" y="52" width="6" height="10" rx="2" fill="#334155" stroke="#475569" stroke-width="1"/>
  <!-- Central dial ring -->
  <circle cx="50" cy="50" r="24" fill="#0F172A" stroke="#2563EB" stroke-width="2"/>
  <!-- Dial spokes -->
  <line x1="50" y1="27" x2="50" y2="36" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="64" x2="50" y2="73" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="27" y1="50" x2="36" y2="50" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="50" x2="73" y2="50" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Diagonal spokes -->
  <line x1="33" y1="33" x2="39" y2="39" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="67" y1="33" x2="61" y2="39" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="33" y1="67" x2="39" y2="61" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="67" y1="67" x2="61" y2="61" stroke="#2563EB" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Inner lock face -->
  <circle cx="50" cy="50" r="15" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <!-- F lettermark -->
  <text x="50" y="56" font-family="Georgia,serif" font-size="18" font-weight="700"
    fill="white" text-anchor="middle">F</text>
</svg>
