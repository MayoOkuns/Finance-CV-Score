<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Finance Career Vault</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0E0E0F;--ink-mid:#3A3A3C;--ink-light:#7A7A80;
  --surface:#F7F6F3;--white:#FFFFFF;
  --accent:#2563EB;--accent-light:#EFF4FF;
  --danger:#DC2626;--warn:#D97706;--good:#16A34A;
  --border:#E4E3DF;--navy:#0F172A;
}
body{font-family:'Inter',sans-serif;background:var(--surface);color:var(--ink);min-height:100vh;font-size:14px}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{background:var(--white);border-radius:16px;padding:40px;width:100%;max-width:380px;border:1px solid var(--border);text-align:center}
.login-card h1{font-size:20px;font-weight:600;margin-bottom:4px}
.login-card p{font-size:13px;color:var(--ink-light);margin-bottom:28px}
.login-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .2s;margin-bottom:12px}
.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;background:var(--navy);color:white;font-size:15px;font-weight:600;padding:13px;border-radius:10px;border:none;cursor:pointer;transition:opacity .15s}
.login-btn:hover{opacity:.85}
.login-error{color:var(--danger);font-size:13px;margin-top:8px}

/* ADMIN LAYOUT */
.admin-wrap{display:none}
nav{background:var(--navy);padding:14px 32px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-size:16px;font-weight:600;color:white;letter-spacing:-0.3px}
.nav-logo span{color:#93C5FD}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-badge{font-family:'JetBrains Mono',monospace;font-size:11px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);padding:4px 10px;border-radius:20px}
.nav-signout{background:none;border:1.5px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);font-size:13px;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.nav-signout:hover{border-color:white;color:white}

.admin-body{max-width:1100px;margin:0 auto;padding:32px 24px}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.admin-header h1{font-size:22px;font-weight:600;letter-spacing:-0.3px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.stat-card{background:var(--white);border-radius:12px;border:1px solid var(--border);padding:20px 24px}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:600;color:var(--ink);display:block}
.stat-label{font-size:12px;color:var(--ink-light);margin-top:4px;text-transform:uppercase;letter-spacing:0.06em}
.stat-card.pending .stat-num{color:var(--warn)}
.stat-card.good .stat-num{color:var(--good)}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--white);border:1px solid var(--border);border-radius:10px;padding:4px;width:fit-content}
.tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;color:var(--ink-light);cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif;transition:all .15s}
.tab.active{background:var(--navy);color:white}

/* TABLE */
.table-wrap{background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden}
.table-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-header h3{font-size:14px;font-weight:600}
.table-count{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-light)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink-light);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:14px 20px;border-bottom:1px solid var(--border);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAF9}

.q-text{font-size:14px;color:var(--ink);line-height:1.5;max-width:400px}
.q-meta{font-size:12px;color:var(--ink-light);margin-top:4px}
.tag{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;white-space:nowrap}
.tag-firm{background:#EFF4FF;color:var(--accent)}
.tag-sector{background:#F0FDF4;color:var(--good)}
.tag-stage{background:#FFFBEB;color:var(--warn)}
.tag-pending{background:#FEF3C7;color:#B45309}
.tag-approved{background:#F0FDF4;color:var(--good)}
.tag-rejected{background:#FEF2F2;color:var(--danger)}

.action-btns{display:flex;gap:6px;flex-wrap:wrap}
.btn-approve{background:#F0FDF4;color:var(--good);border:1.5px solid #BBF7D0;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;white-space:nowrap}
.btn-approve:hover{background:var(--good);color:white;border-color:var(--good)}
.btn-reject{background:#FEF2F2;color:var(--danger);border:1.5px solid #FECACA;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;white-space:nowrap}
.btn-reject:hover{background:var(--danger);color:white;border-color:var(--danger)}
.btn-delete{background:var(--surface);color:var(--ink-light);border:1.5px solid var(--border);padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif}
.btn-delete:hover{border-color:var(--danger);color:var(--danger)}

.empty-state{text-align:center;padding:48px 24px;color:var(--ink-light)}
.empty-state h3{font-size:16px;font-weight:600;color:var(--ink-mid);margin-bottom:6px}

/* USERS TABLE */
.user-email{font-size:13px;font-weight:500}
.user-status{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 8px;border-radius:4px}
.status-active{background:#F0FDF4;color:var(--good)}
.status-trial{background:#FFFBEB;color:var(--warn)}
.status-free{background:var(--surface);color:var(--ink-light)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--ink);color:white;font-size:14px;font-weight:500;padding:12px 20px;border-radius:10px;z-index:2000;transition:transform .3s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* LOADING */
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:700px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .admin-body{padding:20px 16px}
  td,th{padding:10px 14px}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h1>Admin Login</h1>
    <p>Finance Career Vault — Moderation Dashboard</p>
    <input type="email" class="login-input" id="adminEmail" placeholder="Admin email">
    <input type="password" class="login-input" id="adminPassword" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Sign in</button>
    <p class="login-error" id="loginError"></p>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div class="admin-wrap" id="adminWrap">
  <nav>
    <span class="nav-logo">Finance<span>CareerVault</span> Admin</span>
    <div class="nav-right">
      <span class="nav-badge" id="adminEmailBadge"></span>
      <button class="nav-signout" onclick="signout()">Sign out</button>
    </div>
  </nav>

  <div class="admin-body">
    <div class="admin-header">
      <h1>Moderation Dashboard</h1>
      <button onclick="loadAll()" style="background:var(--accent);color:white;border:none;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">↻ Refresh</button>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card pending">
        <span class="stat-num" id="statPending">—</span>
        <span class="stat-label">Pending review</span>
      </div>
      <div class="stat-card good">
        <span class="stat-num" id="statApproved">—</span>
        <span class="stat-label">Approved questions</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="statUsers">—</span>
        <span class="stat-label">Total users</span>
      </div>
      <div class="stat-card good">
        <span class="stat-num" id="statSubs">—</span>
        <span class="stat-label">Active subscribers</span>
      </div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" id="tabPending" onclick="switchTab('pending')">Pending</button>
      <button class="tab" id="tabApproved" onclick="switchTab('approved')">Approved</button>
      <button class="tab" id="tabRejected" onclick="switchTab('rejected')">Rejected</button>
      <button class="tab" id="tabUsers" onclick="switchTab('users')">Users</button>
    </div>

    <!-- CONTENT -->
    <div id="tabContent">
      <div class="spinner"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://yweyfioiwwrvbawwuttk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3ZXlmaW9pd3dydmJhd3d1dHRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjg0OTksImV4cCI6MjA5NzgwNDQ5OX0.aBfrXzVPpjju0UKpLo02dw-hy7xdiPr0l4If5CsZfbk';

// IMPORTANT: Replace with your actual admin email
const ADMIN_EMAIL = 'mayo.okuns@gmail.com';

let sb = null;
let currentTab = 'pending';

async function initSupabase() {
  if (window.supabase) { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); return; }
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
    s.onload = () => { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); resolve(); };
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function login() {
  const email = document.getElementById('adminEmail').value.trim();
  const password = document.getElementById('adminPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';

  if (!email || !password) { errEl.textContent = 'Please enter email and password.'; return; }

  await initSupabase();

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) { errEl.textContent = error.message; return; }

  // Check this is the admin account
  if (data.user.email !== ADMIN_EMAIL) {
    await sb.auth.signOut();
    errEl.textContent = 'Access denied — admin only.';
    return;
  }

  showAdmin(data.user);
}

function showAdmin(user) {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('adminWrap').style.display = 'block';
  document.getElementById('adminEmailBadge').textContent = user.email;
  loadAll();
}

async function signout() {
  await sb.auth.signOut();
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('adminWrap').style.display = 'none';
}

async function loadAll() {
  await Promise.all([loadStats(), loadTab(currentTab)]);
}

async function loadStats() {
  try {
    const [pending, approved, profiles] = await Promise.all([
      sb.from('questions').select('*',{count:'exact',head:true}).eq('status','pending'),
      sb.from('questions').select('*',{count:'exact',head:true}).eq('status','approved'),
      sb.from('profiles').select('subscription_status')
    ]);

    document.getElementById('statPending').textContent = pending.count || 0;
    document.getElementById('statApproved').textContent = approved.count || 0;
    document.getElementById('statUsers').textContent = profiles.data?.length || 0;
    const activeSubs = (profiles.data || []).filter(p => p.subscription_status === 'active').length;
    document.getElementById('statSubs').textContent = activeSubs;
  } catch(err) {
    console.error('Stats error:', err);
  }
}

function switchTab(tab) {
  currentTab = tab;
  ['pending','approved','rejected','users'].forEach(t => {
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1))
      .classList.toggle('active', t === tab);
  });
  loadTab(tab);
}

async function loadTab(tab) {
  const content = document.getElementById('tabContent');
  content.innerHTML = '<div class="spinner"></div>';

  try {
    if (tab === 'users') {
      await loadUsers();
      return;
    }

    const { data, error } = await sb
      .from('questions')
      .select('*')
      .eq('status', tab)
      .order('created_at', { ascending: false });

    if (error) throw error;

    if (!data || data.length === 0) {
      content.innerHTML = `<div class="empty-state"><h3>No ${tab} questions</h3><p>${tab === 'pending' ? 'All caught up!' : 'Nothing here yet.'}</p></div>`;
      return;
    }

    content.innerHTML = `
      <div class="table-wrap">
        <div class="table-header">
          <h3>${tab.charAt(0).toUpperCase() + tab.slice(1)} Questions</h3>
          <span class="table-count">${data.length} question${data.length !== 1 ? 's' : ''}</span>
        </div>
        <table>
          <thead>
            <tr>
              <th>Question</th>
              <th>Tags</th>
              <th>Submitted</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${data.map(q => renderQuestionRow(q, tab)).join('')}
          </tbody>
        </table>
      </div>`;
  } catch(err) {
    console.error('Load tab error:', err);
    content.innerHTML = `<div class="empty-state"><h3>Error loading data</h3><p>${err.message}</p></div>`;
  }
}

function renderQuestionRow(q, tab) {
  const date = new Date(q.created_at).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'});
  const actions = tab === 'pending' ? `
    <div class="action-btns">
      <button class="btn-approve" onclick="approveQuestion('${q.id}','${q.firm}',\`${q.question_text.replace(/`/g,"'")}\`)">✓ Approve</button>
      <button class="btn-reject" onclick="rejectQuestion('${q.id}')">✗ Reject</button>
    </div>` : tab === 'approved' ? `
    <div class="action-btns">
      <button class="btn-reject" onclick="rejectQuestion('${q.id}')">Move to rejected</button>
      <button class="btn-delete" onclick="deleteQuestion('${q.id}')">Delete</button>
    </div>` : `
    <div class="action-btns">
      <button class="btn-approve" onclick="approveQuestion('${q.id}','${q.firm}',\`${q.question_text.replace(/`/g,"'")}\`)">Re-approve</button>
      <button class="btn-delete" onclick="deleteQuestion('${q.id}')">Delete</button>
    </div>`;

  return `
    <tr>
      <td>
        <p class="q-text">${q.question_text}</p>
        ${q.year_asked ? `<p class="q-meta">Asked: ${q.year_asked}</p>` : ''}
      </td>
      <td>
        <div style="display:flex;flex-direction:column;gap:4px">
          <span class="tag tag-firm">${q.firm}</span>
          <span class="tag tag-sector">${q.sub_sector}</span>
          ${q.stage ? `<span class="tag tag-stage">${q.stage}</span>` : ''}
          ${q.role ? `<span class="tag" style="background:var(--surface);color:var(--ink-light)">${q.role}</span>` : ''}
        </div>
      </td>
      <td style="white-space:nowrap;color:var(--ink-light);font-size:12px">${date}</td>
      <td>${actions}</td>
    </tr>`;
}

async function approveQuestion(id, firm, questionText) {
  try {
    const { error } = await sb.from('questions').update({ status: 'approved' }).eq('id', id);
    if (error) throw error;

    // Trigger alert notifications
    try {
      await fetch('/api/notify-alerts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ firm, questionText, questionId: id })
      });
    } catch(e) {
      console.warn('Alert notification failed:', e);
    }

    showToast('✓ Question approved — alerts sent');
    loadAll();
  } catch(err) {
    showToast('Error: ' + err.message);
  }
}

async function rejectQuestion(id) {
  if (!confirm('Reject this question?')) return;
  try {
    const { error } = await sb.from('questions').update({ status: 'rejected' }).eq('id', id);
    if (error) throw error;
    showToast('Question rejected');
    loadAll();
  } catch(err) {
    showToast('Error: ' + err.message);
  }
}

async function deleteQuestion(id) {
  if (!confirm('Permanently delete this question? This cannot be undone.')) return;
  try {
    const { error } = await sb.from('questions').delete().eq('id', id);
    if (error) throw error;
    showToast('Question deleted');
    loadAll();
  } catch(err) {
    showToast('Error: ' + err.message);
  }
}

async function loadUsers() {
  const content = document.getElementById('tabContent');
  try {
    const { data, error } = await sb.from('profiles').select('*').order('created_at', { ascending: false });
    if (error) throw error;

    if (!data || data.length === 0) {
      content.innerHTML = `<div class="empty-state"><h3>No users yet</h3></div>`;
      return;
    }

    content.innerHTML = `
      <div class="table-wrap">
        <div class="table-header">
          <h3>Users</h3>
          <span class="table-count">${data.length} total</span>
        </div>
        <table>
          <thead>
            <tr>
              <th>User ID</th>
              <th>Status</th>
              <th>Trial expires</th>
              <th>CV Pro</th>
              <th>Joined</th>
            </tr>
          </thead>
          <tbody>
            ${data.map(p => {
              const date = new Date(p.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
              const trial = p.trial_expires_at
                ? new Date(p.trial_expires_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'})
                : '—';
              const statusClass = p.subscription_status === 'active' ? 'status-active'
                : p.subscription_status === 'trial' ? 'status-trial' : 'status-free';
              return `<tr>
                <td><span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-light)">${p.id.substring(0,8)}…</span></td>
                <td><span class="user-status ${statusClass}">${p.subscription_status}</span></td>
                <td style="font-size:12px;color:var(--ink-light)">${trial}</td>
                <td style="font-size:13px">${p.cv_pro_purchased ? '✓' : '—'}</td>
                <td style="font-size:12px;color:var(--ink-light);white-space:nowrap">${date}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
  } catch(err) {
    console.error('Load users error:', err);
    content.innerHTML = `<div class="empty-state"><h3>Error loading users</h3><p>${err.message}</p></div>`;
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Check for existing session on load
initSupabase().then(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session && session.user.email === ADMIN_EMAIL) {
    showAdmin(session.user);
  }
});
</script>
</body>
</html>
